<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document</title>
</head>

<body>

<script type="text/javascript">
var count = 0;

document.write("Starting loop <br>");

while(count < 10){
    document.write("Current count: " + count + "<br/>");
    count++;
}
</script>
</body>
</html>
