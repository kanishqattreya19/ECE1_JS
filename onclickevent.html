<!DOCTYPE html>
<html>
<head>
    <title>Mouse Events</title>
</head>
<body>
<div id="box" style="width:200px;height:200px;border:2px solid black;text-align:center;line-height:200px;margin:20px;">
    Try Me
</div>
<button onclick="document.getElementById('box').style.background='blue'">Click</button>
<br><br>
<button onmouseover="document.getElementById('box').style.background='yellow'">Mouse Over</button>
<br><br>
<button onmouseout="document.getElementById('box').style.background='white'">Mouse Out</button>
<br><br>
<button onmousedown="document.getElementById('box').style.background='red'">Mouse Down</button>
<br><br>
<button onmouseup="document.getElementById('box').style.background='green'">Mouse Up</button>
</body>
</html>
