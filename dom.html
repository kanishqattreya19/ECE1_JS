<!DOCTYPE html>
<html>
<head>
    <title>getElementById Example</title>
</head>
<body>
    <h1 id="title">Hello World</h1>
    <button onclick="changeText()">Click Me</button>
    <script>
        function changeText() {
            var element = document.getElementById("title");
            element.innerHTML = "Text Changed!";
        }
    </script>
</body>
</html>
